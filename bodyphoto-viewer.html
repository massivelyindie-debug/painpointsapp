<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Body Injury Assessment</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f12;color:#e8e6e0;min-height:100vh}
.app{max-width:520px;margin:0 auto;padding:14px 14px 40px}
h1{font-size:17px;font-weight:500;margin-bottom:2px}
.sub{font-size:12px;color:#555;margin-bottom:14px}

#viewer{width:100%;height:480px;border-radius:14px;overflow:hidden;background:#141418;border:0.5px solid #252528;position:relative;margin-bottom:10px;touch-action:none}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#4a8aff;font-size:13px;z-index:5;background:#141418}
.spin{width:28px;height:28px;border:2px solid #1a2a40;border-top-color:#4a8aff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#pinLayer{position:absolute;inset:0;pointer-events:none;z-index:4}
.pm{position:absolute;transform:translate(-50%,-50%);pointer-events:none}
.pc{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.7)}

/* Top controls inside viewer */
#viewerControls{position:absolute;top:10px;right:10px;z-index:6;display:flex;flex-direction:column;gap:6px}
.vbtn{padding:6px 12px;font-size:11px;border-radius:8px;border:0.5px solid #2a4060;background:rgba(14,14,22,.85);color:#7ab3ff;cursor:pointer;backdrop-filter:blur(4px);white-space:nowrap}
.vbtn.active{background:rgba(26,42,64,.95);border-color:#4a8aff}

/* Mode row */
.row{display:flex;gap:5px;margin-bottom:10px}
.rbtn{flex:1;padding:8px;text-align:center;font-size:12px;border-radius:8px;border:0.5px solid #252528;background:#161618;color:#555;cursor:pointer}
.rbtn.on{background:#1a2a3a;border-color:#2a4060;color:#7ab3ff}

/* Region hint */
#regionHint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(20,20,28,.9);border:0.5px solid #2a4060;border-radius:20px;padding:5px 14px;font-size:12px;color:#7ab3ff;pointer-events:none;z-index:6;opacity:0;transition:opacity .3s}

/* Pain popup */
.popup{position:absolute;background:#1e1e28;border:0.5px solid #2a2a42;border-radius:12px;padding:13px;z-index:30;width:190px;box-shadow:0 10px 40px rgba(0,0,0,.9)}
.popup h3{font-size:12px;font-weight:500;color:#bbb;margin-bottom:8px}
.sn{font-size:26px;font-weight:500;text-align:center;margin-bottom:2px}
.sw{font-size:10px;text-align:center;color:#444;margin-bottom:7px}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:8px}
.tc{padding:5px;text-align:center;font-size:10px;border-radius:5px;border:0.5px solid #2a2a3a;background:#141420;color:#666;cursor:pointer}
.tc.on{background:#1a2a40;border-color:#2a5aaa;color:#7ab3ff}
.pbs{display:flex;gap:5px}
.pb{flex:1;padding:6px;font-size:11px;border-radius:6px;border:0.5px solid #2a2a3a;background:#141420;color:#888;cursor:pointer}
.pb.ok{background:#1a2a40;border-color:#2a5aaa;color:#7ab3ff}

/* Pins list */
.pins-sec{margin-bottom:10px}
.pins-lbl{font-size:11px;color:#555;margin-bottom:6px}
.pin-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#161618;border:0.5px solid #222;border-radius:7px;margin-bottom:4px}
.pin-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pin-txt{flex:1;font-size:12px;color:#aaa;line-height:1.4}
.pin-meta{font-size:10px;color:#444}
.pin-x{color:#333;cursor:pointer;font-size:16px;padding:0 3px}
.pin-x:hover{color:#ff6b6b}

/* Motion section */
.mot-sec{margin-bottom:10px}
.mot-lbl{font-size:11px;color:#555;margin-bottom:6px}
.mot-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:10px}
.mb{padding:8px 4px;text-align:center;font-size:11px;border-radius:7px;border:0.5px solid #252528;background:#161618;color:#555;cursor:pointer;line-height:1.3}
.mb.on{background:#1a2a40;border-color:#2a4a70;color:#7ab3ff}
.mb .ic{font-size:13px;display:block;margin-bottom:2px}

.go{width:100%;padding:12px;font-size:14px;font-weight:500;border-radius:10px;border:0.5px solid #2a5aaa;background:#1a2a40;color:#7ab3ff;cursor:pointer;margin-bottom:10px}
.go:disabled{opacity:.3;cursor:not-allowed}
.summ{background:#161618;border:0.5px solid #222;border-radius:12px;padding:16px;margin-top:4px}
.summ h2{font-size:15px;font-weight:500;margin-bottom:10px}
.ov{font-size:13px;line-height:1.7;color:#bbb;margin-bottom:12px}
.urg{border-radius:8px;padding:9px 12px;margin-bottom:12px}
.ut{font-size:13px;font-weight:500}
.ur{font-size:12px;margin-top:3px;opacity:.8}
.sh{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.ic2{background:#111114;border:0.5px solid #1e1e22;border-radius:7px;padding:9px 11px;margin-bottom:5px}
.iname{font-size:13px;font-weight:500;margin-bottom:2px}
.idesc{font-size:11px;color:#555;line-height:1.5}
.tip{display:flex;gap:7px;margin-bottom:5px;font-size:12px;color:#888;line-height:1.5}
.disc{font-size:10px;color:#333;border-top:0.5px solid #1e1e22;padding-top:10px;font-style:italic;line-height:1.5;margin-top:10px}
.ltxt{text-align:center;padding:24px;color:#4a8aff;font-size:13px}
.rst{width:100%;padding:9px;font-size:12px;border-radius:8px;border:0.5px solid #222;background:transparent;color:#444;cursor:pointer;margin-top:10px}
.hint{text-align:center;font-size:11px;color:#333;margin-bottom:10px}
</style>
</head>
<body>
<div class="app">
  <h1>Body Injury Assessment</h1>
  <p class="sub">Rotate the 3D model · tap to mark pain locations</p>

  <div id="viewer">
    <div id="overlay"><div class="spin"></div><span id="loadTxt">Loading model…</span></div>
    <div id="pinLayer"></div>
    <div class="popup" id="pop" style="display:none"></div>
    <div id="regionHint"></div>
    <div id="viewerControls">
      <button class="vbtn" id="xrayBtn" onclick="toggleXray()">🦴 X-ray</button>
      <button class="vbtn" onclick="resetView()">⊙ Reset</button>
    </div>
  </div>

  <p class="hint">Drag to rotate · Pinch to zoom · Switch to Pain mode to mark</p>

  <div class="row">
    <div class="rbtn on" id="btnRotate" onclick="setMode('rotate')">🔄 Rotate</div>
    <div class="rbtn" id="btnPain" onclick="setMode('pain')">📍 Mark Pain</div>
  </div>

  <div class="mot-sec">
    <div class="mot-lbl">Which movements cause pain?</div>
    <div class="mot-grid">
      <div class="mb" onclick="togMot(this,'Flexion')"><span class="ic">⬆️</span>Flexion</div>
      <div class="mb" onclick="togMot(this,'Extension')"><span class="ic">⬇️</span>Extension</div>
      <div class="mb" onclick="togMot(this,'Rotation')"><span class="ic">🔄</span>Rotation</div>
      <div class="mb" onclick="togMot(this,'Weight bearing')"><span class="ic">🏋️</span>Weight bearing</div>
      <div class="mb" onclick="togMot(this,'Gripping')"><span class="ic">✊</span>Gripping</div>
      <div class="mb" onclick="togMot(this,'Walking')"><span class="ic">🚶</span>Walking</div>
    </div>
  </div>

  <div class="pins-sec" id="pinsSec" style="display:none">
    <div class="pins-lbl" id="pinsLbl"></div>
    <div id="pinsList"></div>
  </div>

  <button class="go" id="goBtn" disabled onclick="runAssessment()">Generate assessment →</button>
  <div id="summArea"></div>
</div>

<script src="three.min.js"></script>
<script src="GLTFLoader.js"></script>
<script>
const MODEL_URL = 'male_base_mesh_rigged_metahuman_ue5.glb';
const COLS  = ['#ff5f5f','#ff9f5f','#ffd45f','#5fffaa','#5fbaff','#c05fff','#ff5fbe'];
const TYPES = ['Sharp','Aching','Throbbing','Burning','Numb','Stiff'];
const SEVW  = ['','Very mild','Mild','Mild','Moderate','Moderate','Moderate','Significant','Significant','Severe','Extreme'];

// Body region labels based on approximate Y position and X side
const REGION_LABELS = [
  { yMin:1.7, yMax:2.1, label:'Head / Neck' },
  { yMin:1.4, yMax:1.7, xPos:true,  label:'Right Shoulder' },
  { yMin:1.4, yMax:1.7, xPos:false, label:'Left Shoulder' },
  { yMin:1.1, yMax:1.4, xPos:true,  label:'Right Upper Arm' },
  { yMin:1.1, yMax:1.4, xPos:false, label:'Left Upper Arm' },
  { yMin:0.85,yMax:1.4, xCenter:true, label:'Chest / Upper Back' },
  { yMin:0.8, yMax:1.1, xPos:true,  label:'Right Forearm / Elbow' },
  { yMin:0.8, yMax:1.1, xPos:false, label:'Left Forearm / Elbow' },
  { yMin:0.6, yMax:0.85,xCenter:true, label:'Abdomen / Lower Back' },
  { yMin:0.55,yMax:0.8, xPos:true,  label:'Right Wrist / Hand' },
  { yMin:0.55,yMax:0.8, xPos:false, label:'Left Wrist / Hand' },
  { yMin:0.35,yMax:0.6, xPos:true,  label:'Right Hip / Upper Thigh' },
  { yMin:0.35,yMax:0.6, xPos:false, label:'Left Hip / Upper Thigh' },
  { yMin:0.15,yMax:0.35,xPos:true,  label:'Right Knee' },
  { yMin:0.15,yMax:0.35,xPos:false, label:'Left Knee' },
  { yMin:0.0, yMax:0.15,xPos:true,  label:'Right Ankle / Foot' },
  { yMin:0.0, yMax:0.15,xPos:false, label:'Left Ankle / Foot' },
];

let renderer, scene, camera, orbitCtrl, model;
let cachedMeshes = [], origMats = new Map();
let xrayOn = false, mode = 'rotate';
let pins = [], motions = new Set();
let popSev = 5, popType = null, pendingHit = null;
let defaultCamPos = null, defaultTarget = null;
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('DOMContentLoaded', init);

function init() {
  const viewer = document.getElementById('viewer');
  const W = viewer.clientWidth, H = viewer.clientHeight;

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.shadowMap.enabled = true;
  renderer.outputEncoding = THREE.sRGBEncoding;
  viewer.insertBefore(renderer.domElement, viewer.firstChild);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x141418);

  camera = new THREE.PerspectiveCamera(45, W/H, 0.001, 1000);
  camera.position.set(0, 1, 4);

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const key = new THREE.DirectionalLight(0xfff5e8, 1.5);
  key.position.set(2, 4, 3); scene.add(key);
  const fill = new THREE.DirectionalLight(0xe8f0ff, 0.4);
  fill.position.set(-2, 1, 1); scene.add(fill);

  orbitCtrl = buildOrbit(camera, renderer.domElement);
  orbitCtrl.target.set(0, 1, 0);

  let skeletonHelper = null;

  // Load
  const loader = new THREE.GLTFLoader();
  loader.load(MODEL_URL, gltf => {
    model = gltf.scene;

    const rawBox = new THREE.Box3().setFromObject(model);
    const rawSize = rawBox.getSize(new THREE.Vector3());
    const rawCenter = rawBox.getCenter(new THREE.Vector3());

    const scale = 2.0 / rawSize.y;
    model.scale.setScalar(scale);
    model.position.set(
      -rawCenter.x * scale,
      -rawBox.min.y * scale,
      -rawCenter.z * scale
    );

    model.traverse(c => {
      if (!c.isMesh) return;
      cachedMeshes.push(c);
      c.frustumCulled = false;
      const mat = new THREE.MeshBasicMaterial({
        color: 0xc8956a, side: THREE.DoubleSide,
      });
      c.material = mat;
      origMats.set(c.uuid, mat.clone());
    });

    scene.add(model);

    // Build skeleton helpers from each skinned mesh
    const skinnedMeshes = cachedMeshes.filter(c => c.isSkinnedMesh);
    console.log('Skinned meshes:', skinnedMeshes.length);
    if (skinnedMeshes.length > 0) {
      // Use the first skinned mesh's skeleton root
      skeletonHelper = new THREE.SkeletonHelper(skinnedMeshes[0]);
      skeletonHelper.material.linewidth = 3;
      skeletonHelper.material.color = new THREE.Color(0x00ffff);
      skeletonHelper.visible = false;
      scene.add(skeletonHelper);
      console.log('SkeletonHelper bones:', skeletonHelper.bones?.length);
    } else {
      // Fallback — try on root model
      skeletonHelper = new THREE.SkeletonHelper(model);
      skeletonHelper.material.linewidth = 3;
      skeletonHelper.visible = false;
      scene.add(skeletonHelper);
    }

    camera.position.set(0, 1.0, 3.5);
    camera.lookAt(0, 1.0, 0);
    orbitCtrl.target.set(0, 1.0, 0);
    orbitCtrl.minDist = 0.3;
    orbitCtrl.maxDist = 15;

    defaultCamPos = camera.position.clone();
    defaultTarget = orbitCtrl.target.clone();

    document.getElementById('overlay').style.display = 'none';
    renderer.domElement.addEventListener('click', onCanvasClick);
    renderer.domElement.addEventListener('touchend', onTouchEnd, { passive: false });

  }, xhr => {
    if (xhr.total) document.getElementById('loadTxt').textContent = 'Loading… ' + Math.round(xhr.loaded/xhr.total*100) + '%';
  }, err => {
    document.getElementById('overlay').innerHTML = '<div style="font-size:24px">⚠️</div><b style="color:#ff6b6b">Load failed</b><div style="font-size:11px;color:#666;margin-top:6px">' + (err.message||err) + '</div>';
  });

  (function animate() {
    requestAnimationFrame(animate);
    orbitCtrl.update();
    renderer.render(scene, camera);
  })();

  window.addEventListener('resize', () => {
    const w = viewer.clientWidth, h = viewer.clientHeight;
    camera.aspect = w/h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
}

// ── X-RAY ─────────────────────────────────────────────────────────
function toggleXray() {
  xrayOn = !xrayOn;
  document.getElementById('xrayBtn').classList.toggle('active', xrayOn);

  if (xrayOn) {
    // Fade skin to near-invisible
    cachedMeshes.forEach(c => {
      c.material = new THREE.MeshBasicMaterial({
        color: 0xaaccff, transparent: true, opacity: 0.06,
        side: THREE.DoubleSide, depthWrite: false,
      });
    });
    // Show skeleton lines
    if (skeletonHelper) skeletonHelper.visible = true;
  } else {
    // Restore skin
    cachedMeshes.forEach(c => {
      const orig = origMats.get(c.uuid);
      if (orig) c.material = orig.clone();
    });
    if (skeletonHelper) skeletonHelper.visible = false;
  }
}

// ── RESET VIEW ─────────────────────────────────────────────────────
function resetView() {
  if (!defaultCamPos) return;
  animateCam(defaultCamPos, defaultTarget);
}

function animateCam(pos, tgt) {
  const sp = camera.position.clone();
  const st = orbitCtrl.target.clone();
  const ep = pos instanceof THREE.Vector3 ? pos : new THREE.Vector3(pos.x, pos.y, pos.z);
  const et = tgt instanceof THREE.Vector3 ? tgt : new THREE.Vector3(tgt.x, tgt.y, tgt.z);
  let t = 0;
  function step() {
    t += 0.05;
    if (t >= 1) { camera.position.copy(ep); orbitCtrl.target.copy(et); return; }
    const e = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    camera.position.lerpVectors(sp, ep, e);
    orbitCtrl.target.lerpVectors(st, et, e);
    requestAnimationFrame(step);
  }
  step();
}

// ── CLICK / TOUCH ──────────────────────────────────────────────────
let touchEndPos = null;

function onTouchEnd(e) {
  if (e.changedTouches.length !== 1) return;
  const t = e.changedTouches[0];
  const rect = renderer.domElement.getBoundingClientRect();
  touchEndPos = { x: t.clientX, y: t.clientY };
  handleInteraction(t.clientX, t.clientY, rect);
}

function onCanvasClick(e) {
  // Skip if this was a touch event (handled above)
  if (touchEndPos) { touchEndPos = null; return; }
  const rect = renderer.domElement.getBoundingClientRect();
  handleInteraction(e.clientX, e.clientY, rect);
}

function handleInteraction(cx, cy, rect) {
  if (mode !== 'pain') return;
  mouse.x =  ((cx - rect.left) / rect.width)  * 2 - 1;
  mouse.y = -((cy - rect.top)  / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = cachedMeshes.filter(c => !c.userData.xwf);
  const hits = raycaster.intersectObjects(meshes, false);
  if (!hits.length) return;
  const vr = document.getElementById('viewer').getBoundingClientRect();
  const worldPt = hits[0].point.clone();
  // Normalize to model space (model is 2 units tall from y=0 to y=2)
  const normY = worldPt.y / 2;
  const normX = worldPt.x;
  pendingHit = { sx: cx - vr.left, sy: cy - vr.top, worldPt, normY, normX };
  openPopup(pendingHit.sx, pendingHit.sy);
}

function getBodyLabel(normY, normX) {
  const side = normX > 0.05 ? true : normX < -0.05 ? false : null;
  for (const r of REGION_LABELS) {
    if (normY < r.yMin || normY > r.yMax) continue;
    if (r.xCenter) return r.label;
    if (r.xPos !== undefined) {
      if (side === true && r.xPos) return r.label;
      if (side === false && !r.xPos) return r.label;
    }
  }
  return 'Body area';
}

// ── POPUP ──────────────────────────────────────────────────────────
function openPopup(sx, sy) {
  popSev = 5; popType = null;
  const pop = document.getElementById('pop');
  const vw = document.getElementById('viewer').clientWidth;
  const vh = document.getElementById('viewer').clientHeight;
  pop.style.display = 'block';
  pop.style.left = Math.min(Math.max(sx - 95, 4), vw - 198) + 'px';
  pop.style.top  = Math.max(Math.min(sy - 220, vh - 230), 4) + 'px';
  renderPop();
}

function renderPop() {
  document.getElementById('pop').innerHTML =
    '<h3>Mark pain</h3>' +
    '<div class="sn" id="sn">' + popSev + '/10</div>' +
    '<div class="sw">' + SEVW[popSev] + '</div>' +
    '<input type="range" min="1" max="10" value="' + popSev + '" style="width:100%;margin-bottom:7px" oninput="popSev=+this.value;document.getElementById(\'sn\').textContent=popSev+\'/10\'">' +
    '<div class="tg">' + TYPES.map(t => '<div class="tc' + (popType===t?' on':'') + '" onclick="popType=\'' + t + '\';renderPop()">' + t + '</div>').join('') + '</div>' +
    '<div class="pbs"><button class="pb" onclick="closePop()">Cancel</button><button class="pb ok" onclick="savePin()">Save</button></div>';
}

function closePop() { document.getElementById('pop').style.display = 'none'; }

function savePin() {
  if (!popType) { alert('Select a pain type'); return; }
  const idx = pins.length;
  const label = getBodyLabel(pendingHit.normY, pendingHit.normX);
  pins.push({ sx: pendingHit.sx, sy: pendingHit.sy, sev: popSev, type: popType, label });
  closePop();
  const col = COLS[idx % COLS.length];
  const el = document.createElement('div');
  el.className = 'pm';
  el.style.left = pendingHit.sx + 'px';
  el.style.top  = pendingHit.sy + 'px';
  el.innerHTML = '<div class="pc" style="background:' + col + '">' + popSev + '</div>';
  document.getElementById('pinLayer').appendChild(el);
  renderPinList();
  document.getElementById('goBtn').disabled = false;
}

function renderPinList() {
  const sec = document.getElementById('pinsSec');
  if (!pins.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  document.getElementById('pinsLbl').textContent = pins.length + ' pain location' + (pins.length > 1 ? 's' : '') + ' marked';
  document.getElementById('pinsList').innerHTML = pins.map((p, i) =>
    '<div class="pin-item">' +
    '<div class="pin-dot" style="background:' + COLS[i%COLS.length] + '"></div>' +
    '<div class="pin-txt">' + p.label + '<div class="pin-meta">' + p.type + ' · ' + p.sev + '/10</div></div>' +
    '<span class="pin-x" onclick="removePin(' + i + ')">×</span></div>'
  ).join('');
}

function removePin(i) {
  pins.splice(i, 1);
  document.querySelectorAll('.pm').forEach(e => e.remove());
  pins.forEach((p, idx) => {
    const el = document.createElement('div');
    el.className = 'pm';
    el.style.left = p.sx + 'px'; el.style.top = p.sy + 'px';
    el.innerHTML = '<div class="pc" style="background:' + COLS[idx%COLS.length] + '">' + p.sev + '</div>';
    document.getElementById('pinLayer').appendChild(el);
  });
  renderPinList();
  if (!pins.length) document.getElementById('goBtn').disabled = true;
}

// ── CONTROLS ────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  orbitCtrl.enabled = m === 'rotate';
  document.getElementById('viewer').style.cursor = m === 'rotate' ? 'grab' : 'crosshair';
  document.getElementById('btnRotate').classList.toggle('on', m === 'rotate');
  document.getElementById('btnPain').classList.toggle('on', m === 'pain');
}

function togMot(el, name) {
  el.classList.toggle('on');
  motions.has(name) ? motions.delete(name) : motions.add(name);
}

// ── ORBIT ────────────────────────────────────────────────────────────
function buildOrbit(cam, el) {
  const o = {
    enabled: true, target: new THREE.Vector3(),
    minDist: 0.3, maxDist: 15,
    _sph: new THREE.Spherical(), _dSph: new THREE.Spherical(), _scale: 1,
    _rs: new THREE.Vector2(), _re: new THREE.Vector2(), _rd: new THREE.Vector2(),
    _state: -1,
  };
  const quat = new THREE.Quaternion().setFromUnitVectors(cam.up, new THREE.Vector3(0,1,0));
  const quatInv = quat.clone().invert();
  const offset = new THREE.Vector3();
  let ptrs = [], lastPinchDist = 0;

  el.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
  el.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });

  el.addEventListener('pointerdown', e => {
    if (!o.enabled) return;
    el.setPointerCapture(e.pointerId);
    ptrs.push(e);
    if (ptrs.length === 1) { o._state = 0; o._rs.set(e.clientX, e.clientY); }
    else if (ptrs.length === 2) {
      o._state = 1;
      const dx = ptrs[0].clientX-ptrs[1].clientX, dy = ptrs[0].clientY-ptrs[1].clientY;
      lastPinchDist = Math.sqrt(dx*dx+dy*dy);
    }
  });
  el.addEventListener('pointermove', e => {
    if (!o.enabled || o._state < 0) return;
    const i = ptrs.findIndex(p => p.pointerId === e.pointerId);
    if (i !== -1) ptrs[i] = e;
    if (ptrs.length === 1 && o._state === 0) {
      o._re.set(e.clientX, e.clientY);
      o._rd.subVectors(o._re, o._rs).multiplyScalar(Math.PI / el.clientHeight);
      o._dSph.theta -= o._rd.x; o._dSph.phi -= o._rd.y;
      o._rs.copy(o._re);
    } else if (ptrs.length === 2) {
      const dx = ptrs[0].clientX-ptrs[1].clientX, dy = ptrs[0].clientY-ptrs[1].clientY;
      const d = Math.sqrt(dx*dx+dy*dy);
      if (lastPinchDist > 0) o._scale *= lastPinchDist / d;
      lastPinchDist = d;
    }
  });
  el.addEventListener('pointerup', e => {
    ptrs = ptrs.filter(p => p.pointerId !== e.pointerId);
    if (!ptrs.length) { o._state = -1; lastPinchDist = 0; }
    else if (ptrs.length === 1) { o._state = 0; o._rs.set(ptrs[0].clientX, ptrs[0].clientY); lastPinchDist = 0; }
  });
  el.addEventListener('pointerleave', e => {
    ptrs = ptrs.filter(p => p.pointerId !== e.pointerId);
    if (!ptrs.length) { o._state = -1; lastPinchDist = 0; }
  });
  el.addEventListener('wheel', e => { e.preventDefault(); o._scale *= e.deltaY < 0 ? 0.92 : 1.08; }, { passive: false });

  o.update = function() {
    offset.copy(cam.position).sub(o.target).applyQuaternion(quat);
    o._sph.setFromVector3(offset);
    o._sph.theta += o._dSph.theta; o._sph.phi += o._dSph.phi;
    o._sph.phi = Math.max(0.05, Math.min(Math.PI-0.05, o._sph.phi));
    o._sph.radius = Math.max(o.minDist, Math.min(o.maxDist, o._sph.radius * o._scale));
    offset.setFromSpherical(o._sph).applyQuaternion(quatInv);
    cam.position.copy(o.target).add(offset);
    cam.lookAt(o.target);
    o._dSph.theta *= 0.88; o._dSph.phi *= 0.88; o._scale = 1;
  };
  return o;
}

// ── ASSESSMENT ────────────────────────────────────────────────────────
async function runAssessment() {
  document.getElementById('goBtn').disabled = true;
  const area = document.getElementById('summArea');
  area.innerHTML = '<div class="summ"><div class="ltxt">⚕ Generating assessment…</div></div>';
  area.scrollIntoView({ behavior: 'smooth' });

  const pinDesc = pins.map((p,i) => (i+1) + '. ' + p.label + ' — ' + p.type + ', severity ' + p.sev + '/10').join('\n');
  const prompt = 'You are a compassionate clinical injury assessment assistant for a general public self-assessment app.\n\nInjury self-assessment:\n- Painful movements: ' + ([...motions].join(', ')||'not specified') + '\n- Pain locations:\n' + pinDesc + '\n\nReturn ONLY valid JSON:\n{"overview":"2-3 sentences describing the injury pattern","possibleInjuries":[{"name":"condition","description":"one sentence"}],"urgency":"Seek emergency care|See a doctor within 48 hours|Schedule an appointment|Monitor at home","urgencyReason":"one sentence","selfCare":["tip 1","tip 2","tip 3"],"disclaimer":"brief note this is not a medical diagnosis"}';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 900, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    const r = JSON.parse((data.content?.[0]?.text || '{}').replace(/```json|```/g,'').trim());
    showSumm(r);
  } catch(e) {
    area.innerHTML = '<div class="summ" style="color:#ff6b6b;padding:16px">Could not generate. Please try again.</div>';
    document.getElementById('goBtn').disabled = false;
  }
}

function urgStyle(u) {
  if (!u) return { bg:'rgba(18,32,18,.9)', c:'#5aaa5a', bc:'#183018' };
  if (u.includes('emergency')) return { bg:'rgba(42,18,18,.9)', c:'#ff6b6b', bc:'#4a1e1e' };
  if (u.includes('48'))        return { bg:'rgba(40,28,12,.9)', c:'#ffa06b', bc:'#4a3010' };
  if (u.includes('appointment')) return { bg:'rgba(18,24,42,.9)', c:'#6bbfff', bc:'#182848' };
  return { bg:'rgba(18,32,18,.9)', c:'#5aaa5a', bc:'#183018' };
}

function showSumm(r) {
  const u = urgStyle(r.urgency);
  document.getElementById('summArea').innerHTML =
    '<div class="summ"><h2>Assessment</h2><p class="ov">' + (r.overview||'') + '</p>' +
    (r.urgency ? '<div class="urg" style="background:' + u.bg + ';border:0.5px solid ' + u.bc + '"><div class="ut" style="color:' + u.c + '">⚡ ' + r.urgency + '</div><div class="ur" style="color:' + u.c + '">' + (r.urgencyReason||'') + '</div></div>' : '') +
    '<div class="sh" style="margin-bottom:6px">Possible conditions</div>' +
    (r.possibleInjuries||[]).map(i => '<div class="ic2"><div class="iname">' + i.name + '</div><div class="idesc">' + i.description + '</div></div>').join('') +
    '<div class="sh" style="margin-top:12px;margin-bottom:6px">Self-care tips</div>' +
    (r.selfCare||[]).map(t => '<div class="tip"><span style="color:#4a8aff;flex-shrink:0">→</span><span>' + t + '</span></div>').join('') +
    (r.disclaimer ? '<div class="disc">' + r.disclaimer + '</div>' : '') +
    '<button class="rst" onclick="restart()">← New assessment</button></div>';
}

function restart() {
  pins = []; motions = new Set();
  document.querySelectorAll('.pm').forEach(e => e.remove());
  document.querySelectorAll('.mb').forEach(b => b.classList.remove('on'));
  document.getElementById('pinsSec').style.display = 'none';
  document.getElementById('summArea').innerHTML = '';
  document.getElementById('goBtn').disabled = true;
  if (xrayOn) toggleXray();
  resetView();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
